#version: '3.8'
#arreglo ngrok
#funcionando ngro con dominio. y el .env
#crearlo con 1000:1000 si el unico usuairo en la maquina linux.
#crear para los contenedores con mkdir usuario:usuario  /data 

services:
  # 1. Base de datos Postgres con pgvector (Soporte RAG para PDFs)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-rag
    # Cambia esto en el servicio de postgres y n8n:
    user: "${USER_UID}:${USER_GID}"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Ollama (Modelos de IA locales)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-local
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama

  # 3. n8n (Orquestador de automatizaciÃ³n y RAG)
  n8n:
    image: docker.n8n.io/n8nio/n8n:stable
    container_name: n8n-app
    user: "${USER_UID}:${USER_GID}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      #- N8N_HOST=${SUBDOMAIN_NGROK}
      - N8N_PORT=5678
      #CORS
      #- N8N_CORS_ENABLED=true
      #- N8N_CORS_ALLOW_ORIGIN=*
      #- N8N_SECURE_COOKIE=false
      ##- N8N_PROTOCOL=https
##wehook con ngrok.      
	  #- WEBHOOK_URL=https://${SUBDOMAIN_NGROK}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - EXECUTIONS_PROCESS=main
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./shared:/data/shared

  # 4. ngrok (TÃºnel para acceso externo y webhooks de n8n)
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok-tunnel
    restart: unless-stopped
    command:
      - "http"
      - "n8n:5678"
      - "--domain=${NGROK_DOMAIN}"  #
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
    - "4040:4040"  # Para depuración
    depends_on:
      - n8n

  open-webui:
    image: ghcr.io/open-webui/open-webui:main-slim
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      #- WEBUI_AUTH=False
      - ENABLE_OLLAMA_API=True
    volumes:
      - ./open-webui_data:/app/backend/data

#adminer ligero postgres
##
  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    ports:
      - "5052:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
      - ADMINER_DEFAULT_DB=${POSTGRES_DB}
      - ADMINER_DEFAULT_USER=${POSTGRES_USER}
      - ADMINER_DEFAULT_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

# 7. Servidor web para index.html
  web:
    image: nginx:alpine
    container_name: www
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./web_data:/usr/share/nginx/html:ro



